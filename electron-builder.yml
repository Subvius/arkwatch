appId: com.arkwatch.desktop
productName: ArkWatch
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - package.json
asar: true
win:
  icon: build/logo.ico
  target:
    - nsis
  artifactName: ArkWatch-${version}-setup.${ext}
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish: null

