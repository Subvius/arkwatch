appId: com.arkwatch.desktop
productName: ArkWatch
directories:
  output: release/${version}
  buildResources: build
files:
  - out/**/*
  - package.json
extraResources:
  - from: build/logo.ico
    to: assets/logo.ico
asar: true
afterPack: build/after-pack.cjs
win:
  icon: build/logo.ico
  executableName: ArkWatch
  target:
    - nsis
  artifactName: ArkWatch-${version}-setup.${ext}
  signAndEditExecutable: false
  verifyUpdateCodeSignature: false
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
publish:
  provider: github
  owner: Subvius
  repo: arkwatch


